# Feature Investigation Playbooks — Stable across ACM versions
# These profiles describe architecture, prerequisites, and known failure paths
# for core ACM features. They guide AI investigation during Stage 2 analysis.

profiles:

  Search:
    display_name: Search & Discovery
    docs_ref: rhacm-docs/observability/search

    architecture:
      summary: |
        search-collector addon runs on each spoke cluster and indexes resources.
        Data flows to search-aggregator on hub, which feeds search-indexer.
        search-api serves the UI. search-postgres provides persistent index storage.
      data_flow:
        - "search-collector (spoke) collects resources"
        - "Collection Agent feeds raw data to Data Transformer"
        - "Data Transformer processes into Resource Indexer"
        - "Resource Indexer indexes via PostgreSQL database (search-postgres)"
        - "Query Processor serves via REST API Gateway and GraphQL API Server"
        - "search-api serves queries from the console UI"
      key_insight: >
        If search-collector addon is not running on a spoke, resources from that
        spoke won't appear in search results. No error is produced — just empty results.
      cross_subsystem_impact:
        - "Virtualization depends on Search: Fleet Virt uses VM Search Integration to discover VMs across clusters — if Search is down, VM list is empty"
        - "RBAC depends on Search: Fine-Grained RBAC Search Integration filters search results by MCRA permissions"
        - "Console Resource Proxy proxies resource requests through Search Interface"
      ui_routes:
        - "/multicloud/search"
        - "/multicloud/search/resources"
        - "/multicloud/search/resources/yaml"
        - "/multicloud/search/resources/related"
      key_components:
        - name: search-api
          role: Serves search queries to the console UI
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=search-api
        - name: search-collector
          role: Indexes resources on spoke clusters
          type: addon
          namespace: "{mch_ns}"
          pod_label: app=search-collector
        - name: search-indexer
          role: Processes and indexes data into PostgreSQL
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=search-indexer
        - name: search-postgres
          role: PostgreSQL database storing the search index
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=search-postgres

    prerequisites:
      - id: search-mch-component
        type: mch_component
        check_spec:
          component_name: search
        default_enabled: true
        description: Search component enabled in MultiClusterHub
      - id: search-collector-addon
        type: addon
        check_spec:
          addon_name: search-collector
        default_enabled: true
        description: search-collector addon deployed to spoke clusters
    dependencies:
      - Infrastructure

    failure_paths:
      - id: search-disabled
        description: Search component disabled in MultiClusterHub
        category: prerequisite
        symptoms:
          - "(?i)search.*not found"
          - "(?i)search.*tab.*missing"
          - "(?i)cannot find.*search"
        prerequisite_id: search-mch-component
        investigation:
          - step: Check MCH component status
            command: "oc get mch -A -o jsonpath='{.items[0].spec.overrides.components}'"
            expect: "search component with enabled=true"
            if_not: "Search is disabled in MCH — tests targeting search will not find the UI"
        classification: NO_BUG
        confidence: 0.95
        explanation: Search feature is intentionally disabled. Tests expecting it will timeout.

      - id: collector-not-on-spoke
        description: search-collector addon not installed or unhealthy on spoke
        category: connectivity
        symptoms:
          - "(?i)no results.*found"
          - "(?i)empty.*search.*results"
          - "(?i)resource.*not.*found.*search"
        investigation:
          - step: Check addon status on spoke
            command: "oc get managedclusteraddon search-collector -n {spoke_cluster} -o yaml"
            expect: "condition Available=True"
            if_not: "search-collector addon is not healthy on this spoke — resources won't be indexed"
          - step: Check addon pod logs
            command: "oc logs -n {mch_ns} -l app=search-collector --tail=50"
            expect: "No connection errors"
            if_not: "search-collector has connection issues — check network to spoke"
        classification: INFRASTRUCTURE
        confidence: 0.90
        explanation: search-collector addon not running on spoke. Resources from that spoke are not indexed.

      - id: search-api-down
        description: search-api pod crashed or OOM
        category: component_health
        symptoms:
          - "(?i)500.*search"
          - "(?i)search.*error"
          - "(?i)internal server error.*search"
          - "(?i)ECONNREFUSED.*search"
        investigation:
          - step: Check search-api pod
            command: "oc get pods -n {mch_ns} -l app=search-api"
            expect: "1/1 Running, 0 restarts"
            if_not: "search-api is not healthy"
          - step: Check logs for errors
            command: "oc logs -n {mch_ns} -l app=search-api --tail=100"
            expect: "No panic or OOM messages"
            if_not: "search-api is crashing — infrastructure issue"
        classification: INFRASTRUCTURE
        confidence: 0.85
        explanation: search-api pod is not running. All search queries will fail.

      - id: search-postgres-unavailable
        description: search-postgres database down or data lost
        category: component_health
        symptoms:
          - "(?i)postgres.*connection.*refused"
          - "(?i)search.*timeout.*query"
          - "(?i)search.*empty.*results"
          - "(?i)relation.*search.resources.*does not exist"
        investigation:
          - step: Check search-postgres deployment
            command: "oc get pods -n {mch_ns} -l app=search-postgres"
            expect: "1/1 Running, 0 restarts"
            if_not: "search-postgres is down — search index is unavailable"
          - step: Check data integrity
            command: "oc exec deploy/search-postgres -n {mch_ns} -- psql -U searchuser -d search -c 'SELECT count(*) FROM search.resources'"
            expect: "Row count > 0"
            if_not: "search-postgres has empty data — index was lost (emptyDir volume, pod restart)"
          - step: Check NetworkPolicy blocking
            command: "oc get networkpolicy -n {mch_ns} -o name"
            expect: "No NetworkPolicies"
            if_not: "NetworkPolicy may be blocking search-api from reaching search-postgres"
        classification: INFRASTRUCTURE
        confidence: 0.90
        explanation: search-postgres is down or data was lost. Search uses emptyDir — pod restart loses all indexed data.

      - id: search-index-stale
        description: Indexer lag — newly created resources not appearing
        category: data_flow
        symptoms:
          - "(?i)expected.*resource.*not.*found"
          - "(?i)created.*but.*not.*in.*search"
          - "(?i)stale.*results"
        investigation:
          - step: Check search-indexer pod
            command: "oc get pods -n {mch_ns} -l app=search-indexer"
            expect: "Running, low restart count"
            if_not: "search-indexer is restarting — may be rebuilding index"
          - step: Check indexer logs
            command: "oc logs -n {mch_ns} -l app=search-indexer --tail=50"
            expect: "No rebuild or connection lost messages"
            if_not: "Indexer is rebuilding — index is stale during rebuild"
        classification: PRODUCT_BUG
        confidence: 0.75
        explanation: Search indexer has lag. Recently created resources are not yet indexed.

      - id: search-query-regression
        description: Search query returns wrong results — API healthy but logic incorrect
        category: data_flow
        symptoms:
          - "(?i)expected.*result.*not.*match"
          - "(?i)search.*returned.*wrong"
          - "(?i)assert.*search.*result"
          - "(?i)unexpected.*search.*response"
        investigation:
          - step: Check search-api health
            command: "oc get pods -n {mch_ns} -l app=search-api"
            expect: "Running, 0 restarts"
            if_not: "search-api is not healthy — route to search-api-down"
          - step: Verify search-api responds to queries
            command: "oc logs -n {mch_ns} -l app=search-api --tail=50"
            expect: "No error responses, query processing normal"
            if_not: "search-api is returning errors"
        classification: PRODUCT_BUG
        confidence: 0.80
        explanation: Search API is healthy but returns incorrect results. Likely a query processing regression.

      - id: search-selector-stale
        description: Test selector for search UI element no longer matches product
        category: configuration
        symptoms:
          - "(?i)element.*not found.*search"
          - "(?i)search.*selector.*not found"
          - "(?i)Expected to find element.*search"
        investigation:
          - step: Check search-api is healthy
            command: "oc get pods -n {mch_ns} -l app=search-api"
            expect: "Running, 0 restarts"
            if_not: "search-api is not healthy — route to search-api-down"
          - step: Verify search page loads content
            command: "echo 'Manual check: verify /multicloud/search renders search bar and results'"
            expect: "Search page renders with content"
            if_not: "Search page is blank — different failure mode"
        classification: AUTOMATION_BUG
        confidence: 0.85
        explanation: Search backend is healthy. The test selector does not match the current product UI.

  GRC:
    display_name: Governance, Risk & Compliance
    docs_ref: rhacm-docs/governance

    architecture:
      summary: |
        Policy created on hub. grc-policy-propagator sends it to managed clusters
        via work-manager. config-policy-controller enforces on spoke.
        Compliance status reported back to hub. Policy types include
        ConfigurationPolicy, CertificatePolicy, IAMPolicy.
      data_flow:
        - "Policy created on hub (or via PolicyGenerator CLI/Kustomize plugin)"
        - "Policy Propagator Controller distributes to managed clusters using PlacementBinding + PlacementRule/Placement"
        - "Propagator uses Template Resolvers (with encryption) to resolve hub templates before distribution"
        - "governance-policy-framework-addon on spoke runs 5 sync controllers: Spec Sync, Template Sync, Status Sync, Secret Sync, Gatekeeper Sync"
        - "config-policy-controller enforces ConfigurationPolicy on spoke"
        - "Status Sync Controller reports compliance back to hub"
        - "Status Aggregation Engine on hub calculates root compliance via Root Compliance Calculator"
      key_insight: >
        Policy propagation is a multi-hop flow (hub -> propagator -> work-manager
        -> spoke controller). Failure at any hop means the policy won't apply or
        won't report compliance.
      component_hierarchy:
        - "governance-policy-framework-addon contains: Spec Sync Controller, Template Sync Controller, Status Sync Controller, Secret Sync Controller, Gatekeeper Sync Controller"
        - "Policy Propagator Controller uses: Resource Version Tracker, Template Resolvers, PlacementRule Event Handler, PlacementBinding Event Handler, Placement Decision Handler"
        - "Policy Propagator Controller contains: Status Aggregation Engine (which uses Root Compliance Calculator)"
        - "Addon Manager manages: iam-policy-controller, cert-policy-controller, config-policy-controller, governance-policy-framework-addon"
      cross_subsystem_impact:
        - "Infrastructure: If klusterlet loses connectivity, compliance status stops updating from that spoke (Status Sync cannot report back)"
        - "Console: Resource Proxy proxies GRC Resources for the governance UI"
      ui_routes:
        - "/multicloud/governance"
        - "/multicloud/governance/policies"
        - "/multicloud/governance/policy-sets"
        - "/multicloud/governance/policies/create"
        - "/multicloud/governance/discovered"
      key_components:
        - name: grc-policy-propagator
          role: Distributes policies from hub to managed clusters
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=grc-policy-propagator
        - name: config-policy-controller
          role: Enforces ConfigurationPolicy on spoke clusters
          type: addon
          namespace: "{mch_ns}"
          pod_label: app=config-policy-controller
        - name: governance-policy-framework
          role: Core policy framework addon on spoke
          type: addon
          namespace: "{mch_ns}"
          pod_label: app=governance-policy-framework
        - name: iam-policy-controller
          role: Enforces IAM policies on spoke
          type: addon
          namespace: "{mch_ns}"
          pod_label: app=iam-policy-controller
        - name: cert-policy-controller
          role: Enforces certificate policies on spoke
          type: addon
          namespace: "{mch_ns}"
          pod_label: app=cert-policy-controller

    prerequisites:
      - id: grc-mch-component
        type: mch_component
        check_spec:
          component_name: grc
        default_enabled: true
        description: GRC component enabled in MultiClusterHub
      - id: governance-framework-addon
        type: addon
        check_spec:
          addon_name: governance-policy-framework
        default_enabled: true
        description: governance-policy-framework addon on managed clusters
      - id: config-policy-addon
        type: addon
        check_spec:
          addon_name: config-policy-controller
        default_enabled: true
        description: config-policy-controller addon on managed clusters
    dependencies:
      - Infrastructure

    failure_paths:
      - id: grc-disabled
        description: GRC component disabled in MultiClusterHub
        category: prerequisite
        symptoms:
          - "(?i)governance.*not found"
          - "(?i)grc.*tab.*missing"
          - "(?i)policies.*page.*not.*found"
        prerequisite_id: grc-mch-component
        investigation:
          - step: Check MCH component status
            command: "oc get mch -A -o jsonpath='{.items[0].spec.overrides.components}'"
            expect: "grc component with enabled=true"
            if_not: "GRC is disabled in MCH"
        classification: NO_BUG
        confidence: 0.95
        explanation: GRC feature is intentionally disabled.

      - id: propagator-down
        description: grc-policy-propagator crash — policies not distributed
        category: component_health
        symptoms:
          - "(?i)policy.*not.*propagat"
          - "(?i)policy.*stuck"
          - "(?i)500.*governance"
        investigation:
          - step: Check propagator pod
            command: "oc get pods -n {mch_ns} -l app=grc-policy-propagator"
            expect: "Running, 0 restarts"
            if_not: "policy-propagator is not healthy — policies won't distribute"
          - step: Check propagator logs
            command: "oc logs -n {mch_ns} -l app=grc-policy-propagator --tail=50"
            expect: "No errors"
            if_not: "Propagator is failing — check for resource conflicts or RBAC issues"
        classification: INFRASTRUCTURE
        confidence: 0.85
        explanation: Policy propagator is down. Policies cannot be distributed to managed clusters.

      - id: policy-controller-missing-spoke
        description: config-policy-controller not on spoke
        category: connectivity
        symptoms:
          - "(?i)compliance.*unknown"
          - "(?i)policy.*no.*status"
          - "(?i)non-compliant.*all"
        investigation:
          - step: Check addon on spoke
            command: "oc get managedclusteraddon config-policy-controller -n {spoke_cluster}"
            expect: "Available=True"
            if_not: "config-policy-controller not deployed to this spoke"
        classification: INFRASTRUCTURE
        confidence: 0.90
        explanation: config-policy-controller addon not running on spoke. Policies exist but no compliance reported.

      - id: compliance-stuck
        description: Compliance status not updating (work-manager backlog)
        category: data_flow
        symptoms:
          - "(?i)compliance.*not.*updat"
          - "(?i)stale.*compliance"
          - "(?i)policy.*pending"
        investigation:
          - step: Check work-manager pod
            command: "oc get pods -n {mch_ns}-hub -l app=work-manager"
            expect: "Running, low restart count"
            if_not: "work-manager is overloaded or restarting"
          - step: Check work-manager logs
            command: "oc logs -n {mch_ns}-hub -l app=work-manager --tail=50"
            expect: "No backlog or timeout messages"
            if_not: "work-manager has a backlog — compliance updates are delayed"
        classification: PRODUCT_BUG
        confidence: 0.70
        explanation: Compliance status is stuck. work-manager may have a backlog.

      - id: policy-template-error
        description: Invalid policy template — policy rejected
        category: configuration
        symptoms:
          - "(?i)template.*error"
          - "(?i)invalid.*policy"
          - "(?i)policy.*rejected"
          - "(?i)spec.*invalid"
        investigation:
          - step: Check policy status
            command: "oc get policies -A -o jsonpath='{range .items[*]}{.metadata.name}: {.status.compliant}{\"\\n\"}{end}'"
            expect: "Compliant or NonCompliant status for all policies"
            if_not: "Some policies have no status — may be rejected due to template errors"
        classification: PRODUCT_BUG
        confidence: 0.80
        explanation: Policy template has errors. Policy was rejected before it could be propagated.

      - id: policy-ui-render-error
        description: Policy page shows wrong data — propagator healthy but UI data incorrect
        category: data_flow
        symptoms:
          - "(?i)policy.*wrong.*data"
          - "(?i)governance.*display.*incorrect"
          - "(?i)assert.*policy.*status"
          - "(?i)expected.*compliant.*got"
        investigation:
          - step: Check propagator health
            command: "oc get pods -n {mch_ns} -l app=grc-policy-propagator"
            expect: "Running, 0 restarts"
            if_not: "propagator is not healthy — route to propagator-down"
          - step: Verify policy status in backend
            command: "oc get policies -A -o jsonpath='{range .items[*]}{.metadata.name}: {.status.compliant}{\"\\n\"}{end}'"
            expect: "Status matches what test expects"
            if_not: "Backend status differs — product rendering issue"
        classification: PRODUCT_BUG
        confidence: 0.80
        explanation: Policy propagator is healthy but UI displays incorrect policy data. Likely a rendering regression.

      - id: grc-selector-stale
        description: Test selector for governance UI element no longer matches product
        category: configuration
        symptoms:
          - "(?i)element.*not found.*governance"
          - "(?i)element.*not found.*policy"
          - "(?i)Expected to find element.*grc"
        investigation:
          - step: Check propagator is healthy
            command: "oc get pods -n {mch_ns} -l app=grc-policy-propagator"
            expect: "Running, 0 restarts"
            if_not: "propagator is not healthy — route to propagator-down"
          - step: Verify governance page loads content
            command: "echo 'Manual check: verify /multicloud/governance renders policy list'"
            expect: "Governance page renders with content"
            if_not: "Governance page is blank — different failure mode"
        classification: AUTOMATION_BUG
        confidence: 0.85
        explanation: GRC backend is healthy. The test selector does not match the current governance UI.

  CLC:
    display_name: Cluster Lifecycle
    docs_ref: rhacm-docs/clusters

    architecture:
      summary: |
        Three distinct flows:
        1. Create: Hive ClusterDeployment -> hive-controllers provision -> klusterlet import.
        2. Import: managedcluster-import-controller deploys klusterlet to spoke.
        3. Upgrade: ClusterCurator orchestrates upgrade via curator pods.
        Also: HyperShift for hosted control planes, assisted-service for bare metal.
        KubeVirt provider enables creating clusters on KubeVirt infrastructure.
      data_flow:
        - "ClusterDeployment created on hub (provisioning)"
        - "hive-controllers provisions cloud infrastructure (uses Cloud Provider Secrets for auth)"
        - "managedcluster-import-controller imports cluster (deploys klusterlet agent)"
        - "klusterlet deployed to spoke for management"
        - "ClusterCurator orchestrates upgrades (creates AnsibleJob CRD, uses JobTemplate CRD)"
        - "Cluster Pools provide pre-provisioned clusters via ClusterClaim resources"
        - "HyperShift enables hosted control planes (separate namespace per hosted cluster)"
      key_insight: >
        CLC spans multiple operators (Hive, MCE, ClusterCurator) across different
        namespaces. Failures often cross subsystem boundaries.
      component_hierarchy:
        - "HyperConverged Cluster Operator manages: KubeVirt Operator, CDI Operator, SSP Operator, Cluster Network Addons Operator, Node Maintenance Operator, HostPath Provisioner Operator"
        - "Forklift Controller contains: Migration Controller, Plan Controller, Provider Controller, StorageMap Controller, NetworkMap Controller, Hook Controller"
        - "Curator Jobs create AnsibleJob CRDs and use JobTemplate CRDs for pre/post hooks"
      cross_subsystem_impact:
        - "Infrastructure: CLC depends on klusterlet for spoke connectivity — if klusterlet is down, import/upgrade cannot proceed"
        - "Virtualization: Cluster API Provider KubeVirt uses KubeVirt Operator for KubeVirt-based cluster provisioning"
        - "Governance: PlacementBinding/PlacementRule used by both CLC and GRC for target selection"
      ui_routes:
        - "/multicloud/infrastructure/clusters"
        - "/multicloud/infrastructure/clusters/managed"
        - "/multicloud/infrastructure/clusters/create"
        - "/multicloud/infrastructure/clusters/import"
        - "/multicloud/infrastructure/clusters/details/:namespace/:name"
        - "/multicloud/infrastructure/clusters/sets"
        - "/multicloud/infrastructure/clusters/pools"
        - "/multicloud/infrastructure/environments"
        - "/multicloud/infrastructure/automations"
      key_components:
        - name: cluster-curator
          role: Orchestrates cluster upgrades via curator pods
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=cluster-curator
        - name: managedcluster-import-controller
          role: Deploys klusterlet to spoke for import
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=managedcluster-import-controller
        - name: cluster-manager
          role: Core cluster management controller
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=cluster-manager
        - name: hive-controllers
          role: Provisions cloud infrastructure for new clusters
          type: hub-deployment
          namespace: hive
          pod_label: app=hive-controllers
        - name: registration-operator
          role: Manages hub-side registration of managed clusters
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=registration-operator
        - name: placement-controller
          role: Evaluates placement decisions for workloads
          type: hub-deployment
          namespace: "{mch_ns}-hub"
          pod_label: app=placement-controller

    prerequisites:
      - id: clc-mch-component
        type: mch_component
        check_spec:
          component_name: cluster-lifecycle
        default_enabled: true
        description: Cluster Lifecycle component enabled in MultiClusterHub
      - id: hive-operator
        type: operator
        check_spec:
          operator_name: hive-operator
          namespace: hive
        default_enabled: true
        description: Hive operator installed (required for cluster provisioning)
      - id: cloud-credentials
        type: informational
        check_spec: {}
        default_enabled: true
        description: Appropriate cloud credentials configured for target provider
    dependencies:
      - Infrastructure

    failure_paths:
      - id: clc-disabled
        description: Cluster Lifecycle disabled in MCH
        category: prerequisite
        symptoms:
          - "(?i)cluster.*lifecycle.*not found"
          - "(?i)clusters.*tab.*missing"
        prerequisite_id: clc-mch-component
        investigation:
          - step: Check MCH component status
            command: "oc get mch -A -o jsonpath='{.items[0].spec.overrides.components}'"
            expect: "cluster-lifecycle component with enabled=true"
            if_not: "Cluster Lifecycle is disabled in MCH"
        classification: NO_BUG
        confidence: 0.95
        explanation: Cluster Lifecycle feature is intentionally disabled.

      - id: hive-controllers-down
        description: hive-controllers crash — provisioning fails
        category: component_health
        symptoms:
          - "(?i)provision.*fail"
          - "(?i)hive.*error"
          - "(?i)clusterdeployment.*fail"
        investigation:
          - step: Check hive-controllers pod
            command: "oc get pods -n hive -l app=hive-controllers"
            expect: "Running, 0 restarts"
            if_not: "hive-controllers is not healthy — provisioning will fail"
          - step: Check hive-controllers logs
            command: "oc logs -n hive -l app=hive-controllers --tail=50"
            expect: "No errors"
            if_not: "hive-controllers is crashing — check for credential or API issues"
        classification: INFRASTRUCTURE
        confidence: 0.85
        explanation: hive-controllers is down. Cluster provisioning operations fail.

      - id: import-controller-crash
        description: managedcluster-import-controller crash — import stuck
        category: component_health
        symptoms:
          - "(?i)import.*fail"
          - "(?i)import.*stuck"
          - "(?i)managedcluster.*pending"
        investigation:
          - step: Check import controller pod
            command: "oc get pods -n {mch_ns} -l app=managedcluster-import-controller"
            expect: "Running, 0 restarts"
            if_not: "import controller is not healthy — cluster import stuck"
        classification: INFRASTRUCTURE
        confidence: 0.85
        explanation: Import controller is crashing. Cluster import operations are stuck.

      - id: curator-upgrade-stuck
        description: ClusterCurator job not completing
        category: data_flow
        symptoms:
          - "(?i)upgrade.*fail"
          - "(?i)curator.*timeout"
          - "(?i)upgrade.*stuck"
          - "(?i)clustercurator.*fail"
        investigation:
          - step: Check curator pods
            command: "oc get pods -n {mch_ns} -l app=cluster-curator"
            expect: "Running, low restart count"
            if_not: "Curator controller is not healthy"
          - step: Check curator job logs
            command: "oc get clustercurators -A -o jsonpath='{range .items[*]}{.metadata.name}: {.status.conditions[*].type}={.status.conditions[*].status}{\"\\n\"}{end}'"
            expect: "Completed conditions"
            if_not: "Curator job is stuck — check for upgrade errors"
        classification: PRODUCT_BUG
        confidence: 0.75
        explanation: ClusterCurator upgrade job is not completing. Check curator pod logs for errors.

      - id: managed-cluster-unreachable
        description: Spoke cluster API unreachable — import/upgrade cannot proceed
        category: connectivity
        symptoms:
          - "(?i)cluster.*unreachable"
          - "(?i)connection.*refused.*api"
          - "(?i)cluster.*offline"
          - "(?i)managedcluster.*not.*ready"
        investigation:
          - step: Check managed cluster status
            command: "oc get managedclusters"
            expect: "All clusters show True under AVAILABLE"
            if_not: "One or more managed clusters are not available"
          - step: Check cluster conditions
            command: "oc get managedcluster {cluster_name} -o jsonpath='{.status.conditions}'"
            expect: "ManagedClusterConditionAvailable=True"
            if_not: "Cluster is not reachable from the hub"
        classification: INFRASTRUCTURE
        confidence: 0.90
        explanation: Spoke cluster is unreachable. Import and upgrade operations cannot proceed.

      - id: cluster-create-api-regression
