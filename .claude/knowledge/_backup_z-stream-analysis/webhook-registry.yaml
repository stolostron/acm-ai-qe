mutating_webhooks:
- name: managedclustermutators.admission.cluster.open-cluster-management.io
  owner: ClusterManager
  namespace: open-cluster-management-hub
  failure_policy: Fail
  critical_for:
  - cluster-import
  if_broken: ManagedCluster mutations fail during import

- name: ocm-mutating-webhook
  owner: MCH Operator
  namespace: '{mch-ns}'
  failure_policy: Fail
  critical_for:
  - mch-defaults
  if_broken: MCH default values not applied

common_webhook_issues:
- issue: CA bundle mismatch after cert rotation
  symptoms: 'x509: certificate signed by unknown authority'
  resolution: Check webhook caBundle vs serving cert CA. service-ca-operator should auto-update.
  classification_impact: "INFRASTRUCTURE if webhook cert expired; tests see webhook rejection errors"

- issue: Webhook service not reachable
  symptoms: 'failed calling webhook: connection refused'
  resolution: Check that the webhook's target service and pod are Running.
  classification_impact: "INFRASTRUCTURE -- webhook pod down blocks resource operations"

- issue: Webhook timeout
  symptoms: context deadline exceeded
  resolution: Webhook pod may be overloaded. Check pod resource usage and restart count.
  classification_impact: "INFRASTRUCTURE if timeouts are consistent; may cause test timeouts"
