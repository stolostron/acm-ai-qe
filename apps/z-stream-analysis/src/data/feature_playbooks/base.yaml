  Infrastructure:
    display_name: Infrastructure Foundation
    docs_ref: rhacm-docs/install

    architecture:
      summary: |
        Foundation layer: klusterlet (agent on spokes) maintains heartbeat with hub.
        addon-manager deploys/manages addons. foundation-controller provides
        cluster-level services. MCE provides the base platform.
      data_flow:
        - "MCE provides base platform services (multicluster-engine operator)"
        - "foundation-controller provides cluster-level services"
        - "addon-manager deploys and manages addons on spokes (search-collector, governance-framework, metrics-collector, application-manager)"
        - "klusterlet (spoke) maintains heartbeat with hub via lease renewal"
        - "registration-operator manages hub-side registration of managed clusters"
      key_insight: >
        Infrastructure failures cascade. If klusterlet loses connectivity, ALL
        spoke-dependent features (Search, GRC, App, Observability) fail on that cluster.
      cross_subsystem_impact:
        - "Search: addon-manager deploys search-collector to spokes — if addon-manager is down, search-collector doesn't get deployed"
        - "GRC: addon-manager deploys governance-policy-framework-addon and config-policy-controller — if addon-manager is down, policies don't propagate"
        - "Observability: addon-manager deploys metrics-collector addon — if addon-manager is down, metrics stop flowing"
        - "Application: ManifestWork delivery requires klusterlet connectivity — if klusterlet is disconnected, app deployment to that spoke fails"
        - "ALL features: MCE degraded = platform-wide impact, every feature is affected"
      key_components:
        - name: klusterlet
          role: Agent on spoke clusters maintaining heartbeat with hub
          type: daemonset
          namespace: "{mch_ns}-agent"
          pod_label: app=klusterlet
        - name: addon-manager
          role: Deploys and manages addons on spoke clusters
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=addon-manager
        - name: foundation-controller
          role: Core cluster-level services
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=foundation-controller
        - name: multicluster-engine
          role: MCE base platform operator
          type: operator
          namespace: multicluster-engine
          pod_label: app=multicluster-engine

    prerequisites:
      - id: mce-installed
        type: operator
        check_spec:
          operator_name: multicluster-engine
          namespace: multicluster-engine
        default_enabled: true
        description: MCE operator installed and running
      - id: klusterlet-deployed
        type: addon
        check_spec:
          addon_name: klusterlet
        default_enabled: true
        description: klusterlet agent deployed to managed clusters
    dependencies: []

    failure_paths:
      - id: klusterlet-disconnected
        description: klusterlet agent can't reach hub API — cluster shows NotReady
        category: connectivity
        symptoms:
          - "(?i)cluster.*not.*ready"
          - "(?i)klusterlet.*disconnect"
          - "(?i)lease.*expired"
          - "(?i)managedcluster.*unknown"
        investigation:
          - step: Check managed cluster conditions
            command: "oc get managedclusters"
            expect: "All clusters show AVAILABLE=True"
            if_not: "One or more clusters are disconnected"
          - step: Check klusterlet pod on spoke
            command: "oc get pods -n open-cluster-management-agent -l app=klusterlet"
            expect: "Running"
            if_not: "klusterlet is not running on the spoke"
        classification: INFRASTRUCTURE
        confidence: 0.90
        explanation: klusterlet lost connectivity. All spoke-dependent features fail on this cluster.

      - id: addon-manager-crash
        description: addon-manager down — addon deployment stuck
        category: component_health
        symptoms:
          - "(?i)addon.*stuck"
          - "(?i)addon.*not.*deploy"
          - "(?i)managedclusteraddon.*fail"
        investigation:
          - step: Check addon-manager pod
            command: "oc get pods -n {mch_ns} -l app=addon-manager"
            expect: "Running, 0 restarts"
            if_not: "addon-manager is not healthy"
        classification: INFRASTRUCTURE
        confidence: 0.85
        explanation: addon-manager is down. Addon deployments to spokes are stuck.

      - id: foundation-controller-down
        description: foundation-controller crash — core services unavailable
        category: component_health
        symptoms:
          - "(?i)foundation.*error"
          - "(?i)foundation.*crash"
        investigation:
          - step: Check foundation-controller pod
            command: "oc get pods -n {mch_ns} -l app=foundation-controller"
            expect: "Running, 0 restarts"
            if_not: "foundation-controller is not healthy"
        classification: INFRASTRUCTURE
        confidence: 0.85
        explanation: foundation-controller is down. Core cluster services are unavailable.

      - id: mce-degraded
        description: MCE operator degraded — platform-wide impact
        category: component_health
        symptoms:
          - "(?i)multiclusterengine.*degraded"
          - "(?i)mce.*error"
          - "(?i)multicluster.*engine.*fail"
        investigation:
          - step: Check MCE operator
            command: "oc get multiclusterengines -o yaml"
            expect: "phase: Available"
            if_not: "MCE is degraded — platform-wide impact"
          - step: Check MCE pods
            command: "oc get pods -n multicluster-engine | grep -v Running"
            expect: "No non-running pods"
            if_not: "MCE has unhealthy pods"
        classification: INFRASTRUCTURE
        confidence: 0.90
        explanation: MCE operator is degraded. This causes platform-wide impact across all features.

  RBAC:
    display_name: RBAC & User Management
    docs_ref: rhacm-docs/access_control/rbac

    architecture:
      summary: |
        Fine-grained RBAC extends Kubernetes RBAC with ACM-specific roles.
        Requires fine-grained-rbac MCH component (default: disabled).
        User Management tab renders only when enabled. Depends on
        IDP (Identity Provider) configuration for user enumeration.
        MultiClusterRoleAssignment (MCRA) Operator handles role assignments.
      data_flow:
        - "fine-grained-rbac MCH component enables the feature"
        - "MultiClusterRoleAssignment Operator processes role assignments"
        - "console-api serves RBAC endpoints (/rbac/...)"
        - "RBAC Middleware in console authorizes REST API requests"
        - "RBAC UI (inside Access Management UI) renders User Management tab"
        - "IDP provides user enumeration for role assignment"
      key_insight: >
        fine-grained-rbac is disabled by default. If disabled, the User
        Management tab does not render. Tests looking for it will timeout with no
        error, just a missing element.
      cross_subsystem_impact:
        - "Search: Fine-Grained RBAC Search Integration filters search results by MCRA permissions — RBAC state affects what search returns"
        - "Console: RBAC UI is contained within Access Management UI in the Console subsystem"
        - "Cluster: RBAC UI provides UI for MultiClusterRoleAssignment Operator (Cluster subsystem) and ClusterPermission CRD (Application subsystem)"
      ui_routes:
        - "/multicloud/user-management/identities"
        - "/multicloud/user-management/identities/users"
        - "/multicloud/user-management/identities/groups"
        - "/multicloud/user-management/identities/service-accounts"
        - "/multicloud/user-management/roles"
        - "/multicloud/infrastructure/clusters/details/:namespace/:name/role-assignments"
      key_components:
        - name: console-api
          role: Serves RBAC endpoints for the console UI
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=console-api

    prerequisites:
      - id: rbac-mch-component
        type: mch_component
        check_spec:
          component_name: fine-grained-rbac
        default_enabled: false
        description: fine-grained-rbac MCH component enabled (disabled by default)
      - id: idp-configured
        type: informational
        check_spec: {}
        default_enabled: true
        description: Identity Provider configured on hub cluster (needed for user enumeration)
    dependencies:
      - Console
      - Infrastructure

    failure_paths:
      - id: rbac-flag-disabled
        description: MCH component off — User Management tab absent
        category: prerequisite
        symptoms:
          - "(?i)user.*management.*not found"
          - "(?i)rbac.*tab.*missing"
          - "(?i)role.*assignment.*not found"
          - "(?i)user.*management.*timeout"
          - "(?i)access.*control.*not found"
        prerequisite_id: rbac-mch-component
        investigation:
          - step: Check MCH for fine-grained-rbac
            command: "oc get mch -A -o jsonpath='{.items[0].spec.overrides.components}'"
            expect: "fine-grained-rbac with enabled=true"
            if_not: "RBAC feature flag is disabled — User Management tab will not render"
        classification: NO_BUG
        confidence: 0.95
        explanation: >
          fine-grained-rbac is disabled in MCH. The User Management tab
          does not render. Tests expecting it will timeout.

      - id: idp-not-configured
        description: No IDP configured — user list empty
        category: configuration
        symptoms:
          - "(?i)no.*users.*found"
          - "(?i)user.*list.*empty"
          - "(?i)cannot.*find.*user"
        investigation:
          - step: Check IDP configuration
            command: "oc get oauth cluster -o jsonpath='{.spec.identityProviders}'"
            expect: "At least one identity provider configured"
            if_not: "No IDP configured — user enumeration will return empty results"
        classification: INFRASTRUCTURE
        confidence: 0.80
        explanation: No Identity Provider configured. User enumeration returns empty results.

      - id: rbac-api-error
        description: console-api returns 500 on RBAC endpoints
        category: component_health
        symptoms:
          - "(?i)500.*rbac"
          - "(?i)500.*user.*management"
          - "(?i)rbac.*api.*error"
        investigation:
          - step: Check console-api pod
            command: "oc get pods -n {mch_ns} -l app=console-api"
            expect: "Running, 0 restarts"
            if_not: "console-api is not healthy"
          - step: Check console-api logs for RBAC errors
            command: "oc logs -n {mch_ns} -l app=console-api --tail=100 | grep -i rbac"
            expect: "No error messages related to RBAC"
            if_not: "console-api is returning errors on RBAC endpoints"
        classification: PRODUCT_BUG
        confidence: 0.80
        explanation: console-api returns 500 errors on RBAC endpoints. This is a backend issue.

  Virtualization:
    display_name: Fleet Virtualization
    docs_ref: rhacm-docs/virtualization

    architecture:
      summary: |
        Fleet Virtualization UI is a kubevirt-plugin console extension. Requires
        CNV (OpenShift Virtualization) operator on spoke clusters. Hub-side requires
        cnv-mtv-integrations MCH component for cross-cluster VM management.
        VMs run on spoke clusters; UI on hub displays them via search index.
        MTV Integrations deploys CNV Addon and MTV Addon to managed clusters.
      data_flow:
        - "cnv-mtv-integrations MCH component enables fleet virt on hub"
        - "MTV Integrations deploys CNV Addon and MTV Addon to managed clusters"
        - "HyperConverged Cluster Operator manages: KubeVirt Operator, CDI Operator, SSP Operator, Cluster Network Addons Operator"
        - "KubeVirt Operator provides KubeVirt API for VM operations on spoke"
        - "kubevirt-plugin console extension renders VM UI on hub (VM Tree View, VM Actions)"
        - "VM Search Integration indexes VirtualMachine resources across clusters via Search subsystem"
        - "Cross-Cluster Live Migration uses KubeVirt Migration Operator (depends on KubeVirt Operator)"
      key_insight: >
        Two independent prerequisites: CNV operator on spoke (for VMs to exist)
        AND MCH flag on hub (for fleet UI). Missing either one causes different
        failure modes.
      component_hierarchy:
        - "HyperConverged Cluster Operator manages 6 sub-operators: KubeVirt, CDI, SSP, Cluster Network Addons, Node Maintenance, HostPath Provisioner"
        - "Fleet Virtualization (Console subsystem) contains: VM Actions, VM Tree View"
        - "KubeVirt Operator integrates with CDI Operator for disk management"
      cross_subsystem_impact:
        - "Search: Fleet Virt uses VM Search Integration — if Search is down, VM list across clusters is empty"
        - "Console: Fleet Virtualization UI is part of Console subsystem (dynamic plugin)"
        - "RBAC: Fleet Virtualization integrates with MultiClusterRoleAssignment Operator for VM access control"
        - "Infrastructure: Spoke cluster connectivity required for VM operations — if klusterlet disconnected, VM status stale"
      ui_routes:
        - "/multicloud/search/resources (VM resources displayed via search)"
        - "/multicloud/search/resources/snapshots (VM snapshots)"
        - "/multicloud/infrastructure/clusters/create/kubevirt (KubeVirt cluster creation)"
      key_components:
        - name: virt-api
          role: VM API server on spoke clusters
          type: hub-deployment
          namespace: openshift-cnv
          pod_label: app=virt-api
        - name: kubevirt-operator
          role: KubeVirt operator managing VM infrastructure
          type: operator
          namespace: openshift-cnv
          pod_label: app=kubevirt-operator
        - name: hyperconverged-cluster-operator
          role: HCO operator managing CNV deployment
          type: operator
          namespace: openshift-cnv
          pod_label: app=hyperconverged-cluster-operator

    prerequisites:
      - id: virt-mch-component
        type: mch_component
        check_spec:
          component_name: cnv-mtv-integrations
        default_enabled: false
        description: cnv-mtv-integrations MCH component enabled (disabled by default)
      - id: cnv-operator-spoke
        type: operator
        check_spec:
          operator_name: kubevirt-hyperconverged
          namespace: openshift-cnv
        default_enabled: false
        description: CNV operator installed on spoke clusters (openshift-cnv namespace)
      - id: kubevirt-plugin-registered
        type: crd
        check_spec:
          crd_name: consoleplugins.console.openshift.io
          plugin_name: kubevirt-plugin
        default_enabled: false
        description: kubevirt-plugin console plugin registered
    dependencies:
      - Console
      - Infrastructure
      - Search

    failure_paths:
      - id: virt-flag-disabled
        description: MCH component off — Fleet Virt tab absent
        category: prerequisite
        symptoms:
          - "(?i)virtual.*machine.*not found"
          - "(?i)fleet.*virt.*missing"
          - "(?i)vm.*tab.*not found"
          - "(?i)virtualization.*timeout"
        prerequisite_id: virt-mch-component
        investigation:
          - step: Check MCH for cnv-mtv-integrations
            command: "oc get mch -A -o jsonpath='{.items[0].spec.overrides.components}'"
            expect: "cnv-mtv-integrations with enabled=true"
            if_not: "Fleet Virtualization flag is disabled — VM tab will not render"
        classification: NO_BUG
        confidence: 0.95
        explanation: cnv-mtv-integrations is disabled. Fleet Virt tab will not render.

      - id: cnv-not-on-spoke
        description: CNV operator missing on spoke — no VMs exist
        category: prerequisite
        symptoms:
          - "(?i)no.*virtual.*machine"
          - "(?i)vm.*not.*found"
          - "(?i)kubevirt.*not.*found"
        prerequisite_id: cnv-operator-spoke
        investigation:
          - step: Check CNV operator on spoke
            command: "oc get csv -n openshift-cnv"
            expect: "kubevirt-hyperconverged CSV with Succeeded phase"
            if_not: "CNV operator is not installed on this spoke — VMs cannot exist"
        classification: INFRASTRUCTURE
        confidence: 0.90
        explanation: CNV operator not installed on spoke cluster. VMs cannot be created.

      - id: virt-api-crash
        description: virt-api on spoke crash — VM operations fail
        category: component_health
        symptoms:
          - "(?i)virt.*api.*error"
          - "(?i)vm.*operation.*fail"
          - "(?i)500.*virtual"
        investigation:
          - step: Check virt-api pod
            command: "oc get pods -n openshift-cnv -l app=virt-api"
            expect: "Running, 0 restarts"
            if_not: "virt-api is not healthy"
        classification: INFRASTRUCTURE
        confidence: 0.85
        explanation: virt-api on spoke is crashing. VM operations fail.

      - id: kubevirt-plugin-missing
        description: Console plugin not registered — VM tab absent
        category: configuration
        symptoms:
          - "(?i)vm.*tab.*absent"
          - "(?i)kubevirt.*plugin.*not"
        investigation:
          - step: Check kubevirt-plugin registration
            command: "oc get consoleplugins"
            expect: "kubevirt-plugin listed"
            if_not: "kubevirt-plugin not registered — VM tab will not render"
        classification: INFRASTRUCTURE
        confidence: 0.80
        explanation: kubevirt-plugin console plugin not registered. VM tab absent.

  Automation:
    display_name: Ansible Automation Platform Integration
    docs_ref: rhacm-docs/clusters/automations

    architecture:
      summary: |
        ACM integrates with Ansible Automation Platform (AAP) for cluster lifecycle
        automation templates. Requires AAP operator installed separately (not part of
        ACM/MCE). The Automation page in ACM Console renders only when AAP is detected.
        ClusterCurator uses AnsibleJob CRDs to trigger pre/post-upgrade hooks via AAP.
      data_flow:
        - "AAP operator installed in dedicated namespace (aap, ansible-automation-platform, or tower)"
        - "ACM Console detects AAP via ClusterServiceVersion (CSV) presence"
        - "Automation page renders templates from AAP controller"
        - "ClusterCurator creates AnsibleJob CRDs referencing AAP templates"
        - "AAP controller executes automation jobs on target clusters"
      key_insight: >
        AAP is an external operator, not an ACM component. If AAP is not installed,
        the entire Automation page will show a blank page (no-js / empty body). This
        is NOT a selector issue — the page route exists but has nothing to render.
      cross_subsystem_impact:
        - "CLC: ClusterCurator depends on AAP for pre/post upgrade automation hooks"
        - "Console: Automation page is a Console route that renders AAP templates"
      ui_routes:
        - "/multicloud/infrastructure/automations"
      key_components:
        - name: aap-controller
          role: Ansible Automation Platform controller
          type: operator
          namespace: aap
          pod_label: app=automation-controller

    prerequisites:
      - id: aap-operator-installed
        type: operator
        check_spec:
          operator_name: aap-operator
          namespace: aap
        default_enabled: false
        description: >
          Ansible Automation Platform operator installed. Namespace varies by
          installation (aap, ansible-automation-platform, or tower).
    dependencies:
      - Console
      - Infrastructure

    failure_paths:
      - id: aap-not-installed
        description: AAP operator not installed — Automation page blank
        category: prerequisite
        symptoms:
          - "(?i)no-js"
          - "(?i)blank.*page"
          - "(?i)automation.*not found"
          - "(?i)automation.*timeout"
          - "(?i)template.*not found"
          - "(?i)ansible.*not found"
        prerequisite_id: aap-operator-installed
        investigation:
          - step: Check for AAP operator CSV in common namespaces
            command: "oc get csv -A 2>/dev/null | grep -i 'aap\\|ansible\\|automation-platform\\|tower'"
            expect: "At least one AAP-related CSV in Succeeded phase"
            if_not: "AAP operator is not installed — Automation page has nothing to render"
          - step: Check for AAP subscription
            command: "oc get subscription -A 2>/dev/null | grep -i 'aap\\|ansible\\|automation-platform'"
            expect: "AAP subscription exists"
            if_not: "No AAP subscription found — operator was never installed"
        classification: INFRASTRUCTURE
        confidence: 0.90
        explanation: >
          AAP operator is not installed on the cluster. The Automation page route
          exists in ACM Console but has no content to render, resulting in a blank
          page. This is an environment prerequisite issue, not a test code problem.

      - id: aap-operator-degraded
        description: AAP operator installed but degraded
        category: component_health
        symptoms:
          - "(?i)automation.*error"
          - "(?i)automation.*500"
          - "(?i)template.*fail"
          - "(?i)ansible.*connection"
        investigation:
          - step: Check AAP operator status
            command: "oc get csv -A 2>/dev/null | grep -i 'aap\\|ansible\\|automation-platform'"
            expect: "CSV in Succeeded phase"
            if_not: "AAP operator is installed but not in Succeeded phase"
          - step: Check AAP controller pods
            command: "oc get pods -A 2>/dev/null | grep -i 'automation-controller\\|aap-controller'"
            expect: "Running pods"
            if_not: "AAP controller pods are not healthy"
        classification: INFRASTRUCTURE
        confidence: 0.85
        explanation: AAP operator is installed but degraded. Automation features will fail.

      - id: aap-installed-automation-selector-issue
        description: AAP installed and healthy but test selector doesn't match
        category: configuration
        symptoms:
          - "(?i)element.*not found"
          - "(?i)selector.*not found"
        investigation:
          - step: Confirm AAP is healthy
            command: "oc get csv -A 2>/dev/null | grep -i 'aap\\|ansible\\|automation-platform'"
            expect: "CSV in Succeeded phase"
            if_not: "AAP is not healthy — route to aap-operator-degraded"
          - step: Check that Automation page loads
            command: "echo 'Manual check: verify /multicloud/infrastructure/automations renders content'"
            expect: "Page renders with AAP templates"
            if_not: "Page loads but selector doesn't match — automation test code issue"
        classification: AUTOMATION_BUG
        confidence: 0.85
        explanation: AAP is installed and healthy. The test selector doesn't match the current UI.

  Observability:
    display_name: Observability
    docs_ref: rhacm-docs/observability

    architecture:
      summary: |
        Hub: multicluster-observability-operator deploys Thanos stack
        (thanos-query, thanos-receive, thanos-store) and Grafana in
        open-cluster-management-observability. Spokes: metrics-collector addon
        scrapes and sends metrics to hub's thanos-receive endpoint.
        Requires S3-compatible storage for Thanos persistence.
        Ruler Engine evaluates recording/alerting rules and triggers Alert Manager.
      data_flow:
        - "multicluster-observability-operator deploys observability stack on hub"
        - "Metrics Collection Manager configures Prometheus Stack on spokes"
        - "metrics-collector addon on spokes scrapes metrics from Prometheus"
        - "metrics sent to thanos-receive on hub"
        - "thanos-store persists to S3-compatible storage"
        - "Compactor Service compacts historical data in Metrics Storage"
        - "Query Gateway routes to Query Engine (thanos-query) for Grafana dashboards"
        - "Ruler Engine evaluates rules and triggers Alert Manager Integration"
      key_insight: >
        Observability is the only feature that requires external storage
        (S3/Minio). Missing storage config is a common deployment issue that
        causes thanos-store to crash.
      component_hierarchy:
        - "multicluster-observability-operator deploys: thanos-query, thanos-receive, thanos-store, thanos-compactor, grafana, alertmanager"
        - "Metrics Collection Manager configures Prometheus Stack on spokes"
        - "Query Gateway routes queries to Query Engine"
      cross_subsystem_impact:
        - "Infrastructure: metrics-collector addon deployed by addon-manager — if addon-manager is down, metrics stop flowing from new spokes"
        - "Console: Resource Proxy proxies Observability Dashboard requests for the observability UI"
      ui_routes:
        - "/multicloud/home/overview (observability widgets)"
      key_components:
        - name: multicluster-observability-operator
          role: Deploys and manages the observability stack
          type: operator
          namespace: "{mch_ns}"
          pod_label: app=multicluster-observability-operator
        - name: thanos-query
          role: Serves queries for Grafana dashboards
          type: hub-statefulset
          namespace: "{mch_ns}-observability"
          pod_label: app=thanos-query
        - name: thanos-receive
          role: Receives metrics from spoke collectors
          type: hub-statefulset
          namespace: "{mch_ns}-observability"
          pod_label: app=thanos-receive
        - name: thanos-store
          role: Persists metrics to S3-compatible storage
          type: hub-statefulset
          namespace: "{mch_ns}-observability"
          pod_label: app=thanos-store
        - name: grafana
          role: Visualization dashboards for metrics
          type: hub-deployment
          namespace: "{mch_ns}-observability"
          pod_label: app=grafana

    prerequisites:
      - id: observability-mch-component
        type: mch_component
        check_spec:
          component_name: multicluster-observability-operator
        default_enabled: false
        description: multicluster-observability-operator MCH component enabled
      - id: metrics-collector-addon
        type: addon
        check_spec:
          addon_name: metrics-collector
        default_enabled: true
        description: metrics-collector addon deployed to spoke clusters
      - id: s3-storage
        type: informational
        check_spec: {}
        default_enabled: false
        description: S3-compatible storage configured for Thanos persistence
    dependencies:
      - Infrastructure

    failure_paths:
      - id: observability-disabled
        description: Observability component disabled in MCH
        category: prerequisite
        symptoms:
          - "(?i)observability.*not found"
          - "(?i)observability.*tab.*missing"
          - "(?i)grafana.*not found"
        prerequisite_id: observability-mch-component
        investigation:
          - step: Check MCH component status
            command: "oc get mch -A -o jsonpath='{.items[0].spec.overrides.components}'"
            expect: "multicluster-observability-operator with enabled=true"
            if_not: "Observability is disabled in MCH"
        classification: NO_BUG
        confidence: 0.95
        explanation: Observability feature is intentionally disabled.

      - id: metrics-collector-missing-spoke
        description: metrics-collector addon not installed on spoke — no metrics from that spoke
        category: connectivity
        symptoms:
          - "(?i)no.*metrics.*from"
          - "(?i)metrics.*missing"
          - "(?i)metrics.*collector.*not"
        investigation:
          - step: Check addon status
            command: "oc get managedclusteraddon metrics-collector -A"
            expect: "Available=True for all clusters"
            if_not: "metrics-collector not deployed to some spokes"
        classification: INFRASTRUCTURE
        confidence: 0.90
        explanation: metrics-collector addon not running on spoke. No metrics from that cluster.

      - id: thanos-store-crash
        description: thanos-store crash — usually S3 config issue
        category: component_health
        symptoms:
          - "(?i)thanos.*store.*crash"
          - "(?i)thanos.*store.*error"
          - "(?i)storage.*error"
          - "(?i)s3.*error"
        investigation:
          - step: Check thanos-store pods
            command: "oc get pods -n {mch_ns}-observability -l app=thanos-store"
            expect: "Running, 0 restarts"
            if_not: "thanos-store is crashing — likely S3 configuration issue"
          - step: Check thanos-store logs
            command: "oc logs -n {mch_ns}-observability -l app=thanos-store --tail=50"
            expect: "No S3 connection errors"
            if_not: "S3 storage configuration issue"
        classification: INFRASTRUCTURE
        confidence: 0.85
        explanation: thanos-store is crashing. Usually caused by missing or incorrect S3 storage config.

      - id: grafana-datasource-error
        description: Grafana datasource misconfigured — dashboards empty
        category: configuration
        symptoms:
          - "(?i)grafana.*datasource.*error"
          - "(?i)dashboard.*empty"
          - "(?i)no.*data.*grafana"
        investigation:
          - step: Check Grafana pod
            command: "oc get pods -n {mch_ns}-observability -l app=grafana"
            expect: "Running"
            if_not: "Grafana is not healthy"
          - step: Check datasource configuration
            command: "oc logs -n {mch_ns}-observability -l app=grafana --tail=50"
            expect: "No datasource errors"
            if_not: "Grafana datasource is misconfigured"
        classification: PRODUCT_BUG
        confidence: 0.75
        explanation: Grafana datasource is misconfigured. Dashboards show no data.
