    docs_ref: rhacm-docs/web_console

    architecture:
      summary: |
        ACM console is an OpenShift dynamic plugin (ConsolePlugin CR). console-api
        serves backend data. Two plugins: acm (ACM features) and mce (MCE features).
        Plugins loaded at runtime via Webpack module federation. Auth flows through
        OpenShift OAuth.
