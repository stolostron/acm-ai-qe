# ACM Service Map
# Maps critical Kubernetes Services to their backing pods for connectivity
# diagnosis. When diagnosing inter-component failures, verify Services have
# ready endpoints: oc get endpoints -n <ns> <service-name>
#
# General principle: every inter-component dependency traverses a Service.
# A Service with zero ready endpoints is a silent failure -- requests hang
# or return connection refused, but the Service object shows no error.
#
# Bulk check for Services with no ready endpoints:
#   oc get endpoints -n <ns> --no-headers | awk '$2 == "<none>" {print $1}'
#
# Populated by: manual curation from live cluster data
# Last updated: 2026-04-20
# Source: merged from hub-health + z-stream-analysis service maps

acm_version: "2.17.0"

services:

  mch_namespace:
    note: "Services in the MCH namespace. Namespace varies -- discover with oc get mch -A."
    entries:

      # --- Search subsystem ---
      - name: search-search-api
        port: 4010
        selector: "name=search-api"
        consumers: [console-chart-console-v2]
        diagnostic_note: "Zero endpoints = all search-dependent features fail silently (empty results, no error). Affects: Search UI, Fleet Virt VM list, Fleet Virt tree view, RBAC resource views, some policy status views (Trap 8)."

      - name: search-search-indexer
        port: 3010
        selector: "name=search-indexer"
        consumers: [search-collector]
        diagnostic_note: "Zero endpoints = spoke collectors can't deliver data. Search index stops updating. Existing data still queryable via search-api."

      - name: search-search-postgres
        port: 5432
        selector: "name=search-postgres"
        consumers: [search-api, search-indexer]
        diagnostic_note: "Zero endpoints = all search queries fail with SQL connection error. Uses emptyDir -- data lost on restart (Trap 3). Recreate strategy guarantees downtime during deployment updates."

      # --- Console subsystem ---
      - name: console-chart-console-v2
        port: 3000
        selector: "app=console-chart-v2,component=console"
        consumers: [ocp-console-via-consoleplugin-proxy]
        diagnostic_note: "Zero endpoints = ALL ACM console features unavailable. The OCP console still loads but ACM tabs show errors or blank content."

      # --- Governance subsystem ---
      - name: grc-policy-propagator
        port: 8381
        selector: "component=ocm-policy-propagator"
        consumers: [console-chart-console-v2]
        diagnostic_note: "Zero endpoints = no new policies distributed to spokes. Existing policies continue to be enforced on spokes but compliance status updates stop reaching the hub."

      # --- Observability subsystem ---
      - name: observability-thanos-query
        port: 9090
        namespace_override: open-cluster-management-observability
        selector: "app.kubernetes.io/name=thanos-query"
        consumers: [observability-grafana, observability-rbac-query-proxy]
        diagnostic_note: "Zero endpoints = Grafana dashboards show no data."

      - name: observability-thanos-receive
        port: 19291
        namespace_override: open-cluster-management-observability
        selector: "app.kubernetes.io/name=thanos-receive"
        consumers: [metrics-collector-addons]
        diagnostic_note: "Zero endpoints = metrics ingestion stops. Historical data still queryable."

  multicluster-engine:
    entries:

      # --- Cluster lifecycle ---
      - name: ocm-webhook
        port: 443
        selector: "app=ocm-webhook"
        consumers: [kube-apiserver-via-webhook]
        diagnostic_note: "Zero endpoints = OCM resource validation fails. ManagedCluster operations may be blocked."

      - name: console-mce-console
        port: 3001
        selector: "app=console-mce-console"
        consumers: [ocp-console-via-consoleplugin-proxy]
        diagnostic_note: "Zero endpoints = MCE UI tabs silently disappear (Trap 2). Cluster management, infrastructure, and CLC UI features all missing. No error shown -- nav items simply don't render."

      - name: cluster-proxy
        port: 8090
        selector: "proxy.open-cluster-management.io/component-name=proxy-server"
        consumers: [console-chart-console-v2, console-mce-console]
        diagnostic_note: "Zero endpoints = spoke cluster API proxy unavailable. Features requiring direct spoke access (terminal, logs) fail."

  hive:
    entries:

      - name: hiveadmission
        port: 443
        selector: "app=hiveadmission"
        consumers: [kube-apiserver-via-webhook]
        diagnostic_note: "Zero endpoints = ALL ClusterDeployment operations blocked (Trap 10). kube-apiserver can't reach the admission webhook, so cluster creation, updates, and deletion all fail with 'failed calling webhook' errors."

      - name: hive-controllers
        port: 8080
        selector: "control-plane=controller-manager"
        consumers: [internal-metrics-only]
        diagnostic_note: "Metrics-only service. Zero endpoints means hive-controllers pod is not running -- check deployment and events. Cluster provisioning and deprovision operations will not be processed."

  open-cluster-management-hub:
    entries:

      - name: cluster-manager-registration-webhook
        port: 9443
        selector: "app=cluster-manager-registration-webhook"
        consumers: [kube-apiserver-via-webhook]
        diagnostic_note: "Zero endpoints = ManagedCluster create/update operations rejected. New cluster imports fail."

      - name: cluster-manager-work-webhook
        port: 9443
        selector: "app=cluster-manager-work-webhook"
        consumers: [kube-apiserver-via-webhook]
        diagnostic_note: "Zero endpoints = ManifestWork validation fails. All addon deployment and spoke resource delivery blocked."

      - name: cluster-manager-placement-controller
        port: 8443
        selector: "app=cluster-manager-placement-controller"
        consumers: [internal-metrics-only]
        diagnostic_note: "Metrics endpoint only. Placement health checked via Placement CR status, not Service."

# Diagnostic procedure:
# 1. When a dependency chain shows a broken link, check the Service
#    endpoint at that link: oc get endpoints -n <ns> <service-name>
# 2. If endpoints are empty, the selector doesn't match any Ready pods.
#    Check: oc get pods -n <ns> -l <selector> to see if pods exist.
# 3. If pods exist but aren't Ready, investigate pod health (Layer 9).
# 4. If no pods exist, check the operator that should create them (Layer 9).
# 5. If pods are Ready but still not in endpoints, check readinessProbe
#    configuration and whether the pod's ports match the Service targetPort.
