# Version Compatibility Constraints
# Known product version incompatibilities that affect cluster health and test classification.
# Cross-referenced against operator versions from the cluster to detect compatibility
# gaps vs infrastructure failures.
#
# Populated by: manual QE review + z-stream failure analysis
# Refresh frequency: after each GA release or when new constraints discovered
# Last updated: 2026-04-06
# Reference version: ACM 2.16 GA
# Source: merged from hub-health + z-stream-analysis constraints

constraints:

  - id: ansiblejob-aap25-workflow
    component: AnsibleJob CR / ClusterCurator
    affected_versions:
      aap: ">=2.5"
      acm: "<=2.13"
    description: >
      AnsibleJob CR does not support AAP 2.5+ workflow job templates.
      The AnsibleJob controller attempts to mount AAP 2.4-style secrets
      that do not exist in AAP 2.5+, causing CreateContainerConfigError.
    health_signal: CreateContainerConfigError on AnsibleJob pods
    symptoms:
      - "CreateContainerConfigError"
      - "Ansible posthook is not triggered within time limit"
      - "AnsibleJob not created within"
    detection: >
      oc get csv -A | grep aap
      If AAP version >= 2.5 and ACM version <= 2.13, this is a known
      compatibility gap.
    correct_classification: PRODUCT_BUG
    common_misclassification: INFRASTRUCTURE
    confidence: 0.85
    explanation: >
      CreateContainerConfigError looks like an infrastructure issue (pod
      can't start), but the root cause is a product compatibility gap
      between AnsibleJob CR and the AAP 2.5+ API. The operator CSV shows
      Succeeded, and the AAP instance is healthy -- the CRD simply does
      not support the new workflow API.
    fix: Upgrade ACM to 2.14+

  - id: submariner-ovnk-ocp418
    component: Submariner Gateway
    affected_versions:
      ocp: ">=4.18"
      submariner: "<0.18"
    description: >
      Submariner gateway fails on OCP 4.18+ due to OVN-Kubernetes
      networking changes. Gateway shows "Connecting" indefinitely and
      never establishes tunnels.
    health_signal: Gateway CR status stuck on "Connecting"
    symptoms:
      - "SubmarinerConfig reconciliation failure"
      - "Gateway pod CrashLoopBackOff"
    detection: >
      oc get clusterversion version -o jsonpath='{.status.desired.version}'
      oc get csv -A | grep submariner
      If OCP >= 4.18 and Submariner < 0.18, this is the cause.
    correct_classification: PRODUCT_BUG
    common_misclassification: INFRASTRUCTURE
    confidence: 0.80
    explanation: >
      The Submariner gateway pod crashes because older versions don't
      support the OCP 4.18+ networking API changes. The operator is
      running but the managed components are incompatible.
    fix: Upgrade Submariner to 0.18+
    jira: ACM-22805

  - id: submariner-ovnk-ocp420-transit
    component: Submariner Gateway
    affected_versions:
      ocp: ">=4.20"
    description: >
      OCP 4.20+ introduces OVN-Kubernetes transit switch mode which
      changes routing assumptions that Submariner relies on. Continuing
      compatibility issues beyond the 4.18 fixes.
    health_signal: Similar to ocp418 pattern on newer OCP versions
    detection: >
      oc get clusterversion version -o jsonpath='{.status.desired.version}'
      Check Submariner version compatibility matrix before OCP upgrades.
    correct_classification: PRODUCT_BUG
    common_misclassification: INFRASTRUCTURE
    confidence: 0.75
    fix: Check Submariner release notes for OCP 4.20+ compatibility

  - id: clustercurator-ocp421-upgrade-api
    component: ClusterCurator / cluster-curator-controller
    affected_versions:
      ocp_spoke: ">=4.21"
      acm: "<=2.15"
    description: >
      ClusterCurator upgrade logic uses the pre-4.21 ClusterVersion API
      to patch the desired update. OCP 4.21 changed the upgrade API,
      causing the curator upgrade Job to fail immediately when attempting
      to patch the spoke ClusterVersion.
    health_signal: Curator upgrade Job fails at ClusterVersion patch step
    symptoms:
      - "ClusterCurator job failed"
      - "Upgrade monitoring timeout"
    detection: >
      Check spoke OCP version and curator Job logs.
      If spoke is OCP 4.21+ and ACM is <= 2.15, this is a known issue.
    correct_classification: PRODUCT_BUG
    common_misclassification: INFRASTRUCTURE
    confidence: 0.85
    explanation: >
      The curator controller does not handle OCP 4.21 upgrade monitoring
      correctly in older ACM versions. API incompatibility, not infrastructure failure.
    fix: Upgrade ACM to 2.16+
    jira: ACM-30314

  - id: console-mce-connection-pooling
    component: console-mce / Console Plugin
    affected_versions:
      acm: ">=2.13,<=2.15.0"
    description: >
      console-mce pod enters CrashLoopBackOff due to missing HTTP
      connection pooling. Each request opens a new TCP connection;
      on large clusters, probe responses arrive after the timeout
      threshold. Fixed in 2.15.1 z-stream.
    health_signal: console-mce CrashLoopBackOff, MCE feature tabs disappear
    symptoms:
      - "console-mce CrashLoopBackOff"
      - "MCE UI tabs missing"
    detection: >
      oc get pods -n multicluster-engine -l app=console-mce
      Check for Liveness/Readiness probe failures in events.
    correct_classification: PRODUCT_BUG
    common_misclassification: INFRASTRUCTURE
    confidence: 0.90
    explanation: >
      Connection pooling bug in console-mce causes resource exhaustion.
      The pod crashes repeatedly. All MCE UI tabs silently disappear
      (Trap 2 pattern). Product bug in connection handling, not resource pressure.
    fix: Upgrade to ACM 2.15.1+ or 2.16+
    jira: ACM-24965

  - id: olm-max-openshift-version
    component: OLM / All ACM operators
    affected_versions:
      ocp: "varies per operator bundle"
    description: >
      OLM enforces a hard OCP version ceiling via the
      olm.maxOpenShiftVersion annotation on operator bundles. If the
      cluster's OCP version exceeds this ceiling, OLM blocks operator
      installation or upgrade. This is a platform-level constraint
      affecting ALL operators managed by OLM.
    health_signal: >
      CSV stuck in Pending or Replacing phase after OCP upgrade.
      InstallPlan not created for new operator version. Subscription
      shows state other than AtLatestKnown.
    symptoms:
      - "CSV phase: Replacing"
      - "CSV phase: Pending"
      - "InstallPlan not completed"
      - "operator upgrade blocked"
    detection: >
      oc get csv -n <acm-ns> -o jsonpath='{.items[0].metadata.annotations.olm\.maxOpenShiftVersion}'
      Compare against: oc get clusterversion -o jsonpath='{.status.desired.version}'
    correct_classification: INFRASTRUCTURE
    common_misclassification: PRODUCT_BUG
    confidence: 0.85
    explanation: >
      The operator itself is not broken -- OLM is enforcing a version
      constraint. The root cause is an OCP version that exceeds the
      operator bundle's declared maximum. This requires updating the
      operator bundle or downgrading OCP.
    fix: Wait for operator bundle update supporting the new OCP version
