  Application:
    display_name: Application Lifecycle
    docs_ref: rhacm-docs/applications

    architecture:
      summary: |
        Two deployment models:
        1. Subscription: Channel (Git/Helm/ObjectBucket) -> Subscription -> PlacementRule -> managed clusters via ManifestWork.
        2. ArgoCD/GitOps: ApplicationSet CRD -> GitOps Addon Controller -> OpenShift GitOps Operator on spokes.
        Hub subscription-controller reconciles subscriptions. Status Aggregation Controller collects deployment status.
      data_flow:
        - "multicloud-operators-channel provides Git Channel, Helm Channel, Object Storage Channel"
        - "Channels feed content to multicloud-operators-subscription"
        - "Application Controller watches Application CRD and creates ManifestWork CRD for distribution"
        - "ManifestWork CRD distributes application resources to spoke clusters"
        - "Application Status Controller syncs status back to Application CRD"
        - "GitOps path: GitOps Sync Resource Controller processes ApplicationSet CRDs"
        - "GitOpsCluster CRD imports clusters to OpenShift GitOps Operator"
        - "Status Aggregation Controller creates MulticlusterApplicationSetReport CRD"
      key_insight: >
        Application deployment has two code paths (Subscription vs ArgoCD). Errors
        in channel access (Git auth, Helm repo) appear as subscription stuck, not
        as explicit errors.
      component_hierarchy:
        - "multicloud-operators-channel provides: Git Channel, Helm Channel, Object Storage Channel"
        - "GitOps integration: GitOps Addon Controller manages OpenShift GitOps Operator, GitOps Cluster Controller reconciles GitOpsCluster CRD"
        - "Application Manager Addon validates via Application Webhooks"
      cross_subsystem_impact:
        - "Infrastructure: Application distribution uses ManifestWork which requires klusterlet connectivity to spoke"
        - "Console: Resource Proxy proxies Application Resources for the applications UI"
        - "GitOps: Depends on OpenShift GitOps Operator (external to ACM) — if GitOps operator is not installed, ArgoCD path fails silently"
      ui_routes:
        - "/multicloud/applications"
        - "/multicloud/applications/create/subscription"
        - "/multicloud/applications/create/argo"
        - "/multicloud/applications/create/argopullmodel"
        - "/multicloud/applications/details/:namespace/:name"
        - "/multicloud/applications/advanced"
      key_components:
        - name: application-manager
          role: Manages application resources on spoke clusters
          type: addon
          namespace: "{mch_ns}"
          pod_label: app=application-manager
        - name: subscription-controller
          role: Reconciles subscriptions on hub
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=subscription-controller
        - name: channel-controller
          role: Manages channel resources
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=channel-controller
        - name: multicluster-operators-subscription
          role: Core subscription operator
          type: hub-deployment
          namespace: "{mch_ns}"
          pod_label: app=multicluster-operators-subscription

    prerequisites:
      - id: app-lifecycle-mch-component
        type: mch_component
        check_spec:
          component_name: app-lifecycle
        default_enabled: true
        description: Application Lifecycle component enabled in MultiClusterHub
      - id: application-manager-addon
        type: addon
        check_spec:
          addon_name: application-manager
        default_enabled: true
        description: application-manager addon on managed clusters
    dependencies:
      - Infrastructure

    failure_paths:
      - id: app-lifecycle-disabled
        description: Application Lifecycle disabled in MCH
        category: prerequisite
        symptoms:
          - "(?i)application.*not found"
          - "(?i)app.*tab.*missing"
        prerequisite_id: app-lifecycle-mch-component
        investigation:
          - step: Check MCH component status
            command: "oc get mch -A -o jsonpath='{.items[0].spec.overrides.components}'"
            expect: "app-lifecycle component with enabled=true"
            if_not: "Application Lifecycle is disabled in MCH"
        classification: NO_BUG
        confidence: 0.95
        explanation: Application Lifecycle feature is intentionally disabled.

      - id: subscription-controller-down
        description: subscription-controller crash — subscriptions not reconciled
        category: component_health
        symptoms:
          - "(?i)subscription.*not.*reconcil"
          - "(?i)subscription.*stuck"
          - "(?i)subscription.*error"
        investigation:
          - step: Check subscription-controller pod
            command: "oc get pods -n {mch_ns} -l app=subscription-controller"
            expect: "Running, 0 restarts"
            if_not: "subscription-controller is not healthy"
        classification: INFRASTRUCTURE
        confidence: 0.85
        explanation: subscription-controller is down. Subscriptions are not being reconciled.

      - id: channel-unreachable
        description: Git/Helm/ObjectBucket channel auth or network failure
        category: connectivity
        symptoms:
          - "(?i)channel.*auth.*fail"
          - "(?i)channel.*unreachable"
          - "(?i)git.*clone.*fail"
          - "(?i)helm.*repo.*fail"
        investigation:
          - step: Check channel status
            command: "oc get channels -A"
            expect: "All channels show status"
            if_not: "Some channels are unreachable"
        classification: INFRASTRUCTURE
        confidence: 0.80
        explanation: Channel source (Git/Helm) is unreachable. Application deployment stuck.

      - id: placement-no-match
        description: PlacementRule selects no clusters
        category: configuration
        symptoms:
          - "(?i)no.*cluster.*match"
          - "(?i)placement.*no.*decision"
          - "(?i)subscription.*not.*deployed"
        investigation:
          - step: Check placement decisions
            command: "oc get placementdecisions -A"
            expect: "Decisions with cluster selections"
            if_not: "No clusters matched the placement criteria"
        classification: AUTOMATION_BUG
        confidence: 0.65
        explanation: PlacementRule selects no clusters. May be a test setup issue or a product behavior change.

      - id: subscription-reconcile-error
        description: Subscription never reconciles — controller healthy but reconciliation fails
        category: data_flow
        symptoms:
          - "(?i)subscription.*propagat.*fail"
          - "(?i)subscription.*status.*fail"
          - "(?i)assert.*subscription.*status"
          - "(?i)subscription.*phase.*not.*propagated"
        investigation:
          - step: Check subscription-controller health
            command: "oc get pods -n {mch_ns} -l app=subscription-controller"
            expect: "Running, 0 restarts"
            if_not: "subscription-controller not healthy — route to subscription-controller-down"
          - step: Check subscription status
            command: "oc get subscriptions.apps.open-cluster-management.io -A -o jsonpath='{range .items[*]}{.metadata.name}: {.status.phase}{\"\\n\"}{end}'"
            expect: "Subscriptions show Propagated phase"
            if_not: "Subscriptions not reconciling despite healthy controller"
        classification: PRODUCT_BUG
        confidence: 0.80
        explanation: Subscription controller is healthy but subscriptions fail to reconcile. Likely a reconciliation regression.

      - id: app-selector-stale
        description: Test selector for application UI element no longer matches product
        category: configuration
        symptoms:
          - "(?i)element.*not found.*application"
          - "(?i)Expected to find element.*app"
          - "(?i)element.*not found.*subscription"
        investigation:
          - step: Check application backend is healthy
            command: "oc get pods -n {mch_ns} -l app=subscription-controller"
            expect: "Running, 0 restarts"
            if_not: "subscription-controller not healthy — investigate backend"
          - step: Verify applications page loads content
            command: "echo 'Manual check: verify /multicloud/applications renders application list'"
            expect: "Applications page renders with content"
            if_not: "Applications page is blank — different failure mode"
        classification: AUTOMATION_BUG
        confidence: 0.85
        explanation: Application backend is healthy. The test selector does not match the current application UI.

  Console:
