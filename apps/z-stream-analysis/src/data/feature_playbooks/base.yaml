        - "User authenticates via OpenShift OAuth → Authentication Handler → Session Manager"
        - "Plugin Management System manages MCE Plugin and ACM Plugin"
        - "Plugin Framework extends Frontend React Components"
        - "Frontend React Components communicate via REST API Controllers"
        - "RBAC Middleware authorizes REST API Controllers"
        - "Resource Proxy proxies requests to: Search Interface, Cluster Resources, Observability Dashboards, Application Resources, GRC Resources"
        - "Dashboard Renderer streams via WebSocket Manager"
        - "console-api serves backend data (RBAC endpoints, cluster data, resource proxy)"
      key_insight: >
        If the ConsolePlugin CR is missing or the plugin service is down, entire
        feature tabs disappear from the UI. No error — just missing navigation items.
      component_hierarchy:
        - "Access Management UI contains RBAC UI"
        - "Fleet Virtualization contains: VM Actions, VM Tree View"
